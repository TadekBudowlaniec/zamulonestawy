[build]
  publish = "."
  # Pomijaj build, jesli jedyna zmiana od ostatniego deployu to contacted*.json
  # (klient i tak czyta te pliki bezposrednio z GitHub API, nie z deployu).
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!contacted.json' ':!contacted_paznokcie.json'"

# Czyste URL-e bez .html
[[redirects]]
  from = "/paznokcie"
  to = "/paznokcie.html"
  status = 200
